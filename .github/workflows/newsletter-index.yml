name: Build Newsletter Index

# Turns the markdown files in newsletters/ into newsletters.json, which the
# newsletter page reads. An issue only appears once its publish time has
# passed, so issues can be written well in advance.
#
# Runs on every change to an issue, and on a schedule so that issues waiting
# for their publish time actually go out.

on:
  push:
    branches: [main]
    paths:
      - 'newsletters/**.md'
      - 'newsletters/timezone.txt'
      - '.github/workflows/newsletter-index.yml'
  schedule:
    # Every 15 minutes. GitHub does not run these to the minute, so a due
    # issue typically appears within about 15-30 minutes of its publish time.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: newsletter-index

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build newsletters.json
        run: |
          python3 - <<'PY'
          import glob, html, json, os, re
          from datetime import datetime
          from zoneinfo import ZoneInfo

          # Which clock the publish: times are meant in. Edit
          # newsletters/timezone.txt to change it, e.g. Europe/Berlin.
          FALLBACK = "America/Detroit"
          tz_name = FALLBACK
          try:
              with open("newsletters/timezone.txt", encoding="utf-8") as f:
                  for line in f:
                      line = line.split("#")[0].strip()
                      if line:
                          tz_name = line
                          break
          except FileNotFoundError:
              print("No newsletters/timezone.txt, using %s" % FALLBACK)

          try:
              TZ = ZoneInfo(tz_name)
          except Exception:
              # A typo must not block every future issue from going out, so
              # fall back rather than fail - but say so loudly.
              print("::warning::Unknown timezone %r in newsletters/timezone.txt "
                    "- falling back to %s. Publish times may be off."
                    % (tz_name, FALLBACK))
              tz_name = FALLBACK
              TZ = ZoneInfo(FALLBACK)

          now = datetime.now(TZ)
          print("Timezone: %s (now %s)" % (tz_name, now.strftime("%Y-%m-%d %H:%M %Z")))

          def inline(text):
              """Escape first, then allow a small, fixed set of markup."""
              t = html.escape(text)
              t = re.sub(r'\[([^\]]+)\]\((https?://[^\s)]+)\)',
                         r'<a href="\2">\1</a>', t)
              t = re.sub(r'\*\*(.+?)\*\*', r'<b>\1</b>', t)
              t = re.sub(r'(?<!\*)\*([^*]+)\*(?!\*)', r'<i>\1</i>', t)
              return t

          def to_html(body):
              out = []
              for block in re.split(r'\n\s*\n', body.strip()):
                  block = block.strip()
                  if not block:
                      continue
                  lines = block.split('\n')
                  if all(l.strip().startswith('- ') for l in lines):
                      items = ''.join(
                          '<li>%s</li>' % inline(l.strip()[2:]) for l in lines)
                      out.append('<ul>%s</ul>' % items)
                  elif block.startswith('## '):
                      out.append('<h3>%s</h3>' % inline(block[3:].strip()))
                  elif block.startswith('### '):
                      out.append('<h4>%s</h4>' % inline(block[4:].strip()))
                  else:
                      out.append('<p>%s</p>' % inline(block).replace('\n', '<br>'))
              return ''.join(out)

          issues, waiting = [], []
          for path in sorted(glob.glob('newsletters/*.md')):
              base = os.path.basename(path)
              if base.lower() == 'readme.md':
                  continue
              m = re.match(r'(\d{4}-\d{2}-\d{2})-(.+)\.md$', base)
              if not m:
                  print('Skipping %s: filename must be YYYY-MM-DD-name.md' % base)
                  continue
              date, slug = m.group(1), m.group(2)

              with open(path, encoding='utf-8') as f:
                  raw = f.read()

              # Optional "publish: YYYY-MM-DD HH:MM" line, removed before
              # rendering so it never shows up in the letter itself.
              pub = re.search(
                  r'^[ \t]*publish:[ \t]*(\d{4})-(\d{2})-(\d{2})'
                  r'(?:[ T]+(\d{1,2}):(\d{2}))?[ \t]*$',
                  raw, re.MULTILINE | re.IGNORECASE)
              if pub:
                  y, mo, d = int(pub.group(1)), int(pub.group(2)), int(pub.group(3))
                  hh = int(pub.group(4) or 0)
                  mi = int(pub.group(5) or 0)
                  raw = raw[:pub.start()] + raw[pub.end():]
              else:
                  # No publish line: use the date from the filename, midnight.
                  y, mo, d = (int(x) for x in date.split('-'))
                  hh = mi = 0

              try:
                  when = datetime(y, mo, d, hh, mi, tzinfo=TZ)
              except ValueError:
                  print('Skipping %s: invalid publish date' % base)
                  continue

              if when > now:
                  waiting.append('%s (due %s)' % (base, when.strftime('%Y-%m-%d %H:%M %Z')))
                  continue

              title, body = slug.replace('-', ' ').title(), raw
              tm = re.search(r'^\s*#\s+(.+?)\s*$', raw, re.MULTILINE)
              if tm:
                  title = tm.group(1).strip()
                  body = raw[tm.end():]

              issues.append({
                  # The date shown to readers is when the issue actually went
                  # out, which is the publish time if one was given. Otherwise
                  # it falls back to the date in the filename.
                  'date': when.strftime('%Y-%m-%d'),
                  'slug': slug,
                  'title': title,
                  'html': to_html(body),
                  '_sort': when.isoformat(),
              })

          issues.sort(key=lambda i: i['_sort'], reverse=True)
          for i in issues:
              del i['_sort']

          with open('newsletters.json', 'w', encoding='utf-8') as f:
              json.dump(issues, f, indent=2, ensure_ascii=False)
              f.write('\n')

          print('Published %d issue(s) as of %s' % (
              len(issues), now.strftime('%Y-%m-%d %H:%M %Z')))
          for w in waiting:
              print('  waiting: %s' % w)
          PY

      - name: Commit and redeploy if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain newsletters.json)" ]; then
            echo "newsletters.json already up to date"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add newsletters.json
          git commit -m "Rebuild newsletter index"
          git push

          # A commit made with GITHUB_TOKEN does not trigger other workflows,
          # so the Pages deploy has to be started explicitly or the site would
          # keep serving the previous index.
          gh workflow run pages.yml --ref main
          echo "Triggered Pages deploy"
